# RSS Aggregator Configuration

# AI Provider: openai | claude | openrouter
[ai]
provider = "openrouter"
model = "nvidia/nemotron-3-nano-30b-a3b:free"
# Set via environment variables:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, or OPENROUTER_API_KEY

# Fetch settings
[fetch]
timeout_seconds = 15
max_articles_per_feed = 20
user_agent = "rss_aggr/1.0 (https://github.com/est/rss_aggr/)"

# Limits: control per-run scope (0 = no limit)
[limits]
max_feeds = 500          # max feeds to fetch per run
max_articles = 20       # max articles to classify per run
fetch_interval_hours = 12  # skip feeds fetched within this window
disable_after_failures = 3 # auto-disable feed after N consecutive failures

# Storage
[storage]
data_dir = "output"
keep_days = 90

# Scoring
[[scoring.dimension]]
name = "relevance"
weight = 0.3
description = "How relevant to current tech trends"

[[scoring.dimension]]
name = "originality"
weight = 0.3
description = "Novel insights or unique perspective"

[[scoring.dimension]]
name = "quality"
weight = 0.4
description = "Writing quality and depth of analysis"

# Classification categories
[[category]]
name = "AI/ML"
keywords = ["artificial intelligence", "machine learning", "LLM", "neural", "deep learning"]

[[category]]
name = "Web Development"
keywords = ["javascript", "typescript", "react", "vue", "css", "html"]

[[category]]
name = "Infrastructure"
keywords = ["kubernetes", "docker", "cloud", "aws", "gcp", "devops"]

[[category]]
name = "Programming"
keywords = ["python", "rust", "golang", "algorithm", "programming"]

[[category]]
name = "Security"
keywords = ["security", "vulnerability", "exploit", "CVE", "hack"]

[[category]]
name = "Business"
keywords = ["startup", "funding", "IPO", "acquisition", "revenue"]

[[category]]
name = "General Tech"
keywords = []
