# RSS Aggregator Configuration

# AI Provider: openai | claude | openrouter | custom
# - openai: OpenAI API (default base_url: https://api.openai.com/v1)
# - openrouter: OpenRouter (default base_url: https://openrouter.ai/api/v1)
# - custom: Any OpenAI-compatible API (requires base_url)
# - claude: Anthropic Claude (requires anthropic SDK)
[ai]
provider = "custom"
model = "mimo-v2.5-free"
# base_url = ""  # Optional: custom API endpoint for openai/openrouter/custom
base_url = 'https://opencode.ai/zen/v1'
# api_key_env = ""  # Optional: env var name for API key (default: provider-specific)

# Fetch settings
[fetch]
timeout_seconds = 15
keep_days = 14
user_agent = "rss_aggr/1.0 (https://github.com/est/rss_aggr/)"
max_workers = 10

# Filters: deterministic rules (free, fast) + AI prompt (cheap)
[filter]
skip_titles = ["weekly digest", "周报", "link list", "newsletter", "周刊", "每日速递", "月报", "monthly", "daily links", "资源汇总", "合集", "值得阅读", "本周推荐", "reading list"]
skip_prompt = "If this article is a news digest, link roundup, personal diary, or off-topic life update, set category to 'skip'. Only classify substantive technical articles, business insights, or thoughtful personal essays."

# Limits: control per-run scope (0 = no limit)
[limits]
max_feeds = 500          # max feeds to fetch per run
max_articles = 200       # max articles to classify per run
fetch_interval_hours = 12  # skip feeds fetched within this window
disable_after_failures = 3 # auto-disable feed after N consecutive failures

# Storage
[storage]
data_dir = "output"
keep_days = 0          # 0 = never delete old output

# Classification categories (passed to AI)
[[category]]
name = "Tech"

[[category]]
name = "Biz"

[[category]]
name = "Life"

[[category]]
name = "Insight"

[[category]]
name = "Misc"
