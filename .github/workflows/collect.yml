name: RSS Collection & Classification

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: rss-state

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync feeds
        run: python -m src.main --sync

      - name: Commit feeds to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.toml
          git diff --cached --quiet || git commit -m "chore: sync feeds $(date -u +%Y-%m-%d)" && git push

      - name: Fetch RSS
        run: python -m src.main --fetch

      - name: Classify articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m src.main --classify

      - name: Convert markdown to HTML
        run: |
          sudo apt-get install -y pandoc
          # Fix links in index.md: .md -> .html
          sed -i 's/\.md/.html/g' output/index.md
          # Convert all .md to .html
          find output -name '*.md' | while read f; do
            pandoc "$f" -o "${f%.md}.html" --standalone
            rm "$f"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
