name: RSS Collection & Classification

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Restore state and articles cache
        uses: actions/cache@v4
        with:
          path: |
            state.json
            articles.json
          key: rss-state

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync feeds
        run: python -m src.main --sync

      - name: Commit feeds to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.com"
          git add feeds.toml
          git diff --cached --quiet || git commit -m "chore: sync feeds $(date -u +%Y-%m-%d)" && git push

      - name: Setup worktree and restore data from gh-pages
        run: |
          # Create gh-pages worktree (or update if exists)
          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git worktree add /tmp/gh-pages gh-pages 2>/dev/null || true
          else
            git fetch origin gh-pages:gh-pages 2>/dev/null || true
            if git rev-parse --verify gh-pages >/dev/null 2>&1; then
              git worktree add /tmp/gh-pages gh-pages 2>/dev/null || true
            else
              git worktree add -b gh-pages /tmp/gh-pages 2>/dev/null || true
              echo "Created new gh-pages branch"
            fi
          fi
          # Copy data from gh-pages to working directory
          mkdir -p output
          if [ -d /tmp/gh-pages/output ]; then
            cp -R /tmp/gh-pages/output/. output/ 2>/dev/null || true
          fi
          if [ -f /tmp/gh-pages/state.json ]; then
            cp /tmp/gh-pages/state.json state.json
          fi
          if [ -f /tmp/gh-pages/articles.json ]; then
            cp /tmp/gh-pages/articles.json articles.json
          elif [ -f /tmp/gh-pages/cache.json ]; then
            # Backward compatibility: migrate cache.json to articles.json
            cp /tmp/gh-pages/cache.json articles.json
          fi
          echo "Restored $(find output/ -name '*.md' 2>/dev/null | wc -l) output files"

      - name: Fetch RSS
        run: python -m src.main --fetch

      - name: Classify articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m src.main --classify

      - name: Cleanup old articles
        run: python -m src.main --cleanup

      - name: Fix links for Jekyll
        run: test -f output/index.md && sed -i 's/\.md)/.html)/g' output/index.md || echo "No index.md, skipping"

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./output
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Persist data to gh-pages worktree
        run: |
          # Copy results to gh-pages worktree
          rm -rf /tmp/gh-pages/output
          cp -R output /tmp/gh-pages/output
          cp state.json /tmp/gh-pages/state.json
          cp articles.json /tmp/gh-pages/articles.json
          # Commit and push
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.com"
          git add output state.json articles.json
          git diff --cached --quiet || git commit -m "chore: persist output $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages
          cd -
          # Cleanup worktree
          git worktree remove /tmp/gh-pages --force
