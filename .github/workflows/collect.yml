name: RSS Collection & Classification

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Restore state and cache
        uses: actions/cache@v4
        with:
          path: |
            state.json
            cache.json
          key: rss-state

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync feeds
        run: python -m src.main --sync

      - name: Commit feeds to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.toml
          git diff --cached --quiet || git commit -m "chore: sync feeds $(date -u +%Y-%m-%d)" && git push

      - name: Restore previous output from gh-pages
        run: |
          git fetch origin gh-pages:gh-pages || true
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            echo "Restoring previous output/state from gh-pages..."
            mkdir -p /tmp/old_output
            git archive gh-pages -- output/ state.json cache.json 2>/dev/null | tar -x -C /tmp/old_output || true
            # Preferred layout: gh-pages has output/YYYY...
            if [ -d /tmp/old_output/output ]; then
              cp -rn /tmp/old_output/output/* output/ 2>/dev/null || true
            fi
            # Backward compatibility: historical layout output/output/YYYY...
            if [ -d /tmp/old_output/output/output ]; then
              cp -rn /tmp/old_output/output/output/* output/ 2>/dev/null || true
            fi
            if [ -f /tmp/old_output/state.json ]; then
              cp /tmp/old_output/state.json state.json
            fi
            if [ -f /tmp/old_output/cache.json ]; then
              cp /tmp/old_output/cache.json cache.json
            fi
            echo "Restored $(find output/ -name '*.md' | wc -l) files"
          else
            echo "No previous output found"
          fi

      - name: Fetch RSS
        run: python -m src.main --fetch

      - name: Classify articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m src.main --classify

      - name: Cleanup old cache entries
        run: python -m src.main --cleanup

      - name: Fix links for Jekyll
        run: test -f output/index.md && sed -i 's/\.md)/.html)/g' output/index.md || echo "No index.md, skipping"

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./output
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Persist output/state to gh-pages branch
        run: |
          rm -rf /tmp/new_output /tmp/gh-pages-wt
          mkdir -p /tmp/new_output
          cp -R output/. /tmp/new_output/
          if [ -f state.json ]; then
            cp state.json /tmp/new_state.json
          fi
          if [ -f cache.json ]; then
            cp cache.json /tmp/new_cache.json
          fi

          git fetch origin gh-pages:gh-pages || true
          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git worktree add /tmp/gh-pages-wt gh-pages
          else
            git worktree add -b gh-pages /tmp/gh-pages-wt
          fi

          rm -rf /tmp/gh-pages-wt/output
          mkdir -p /tmp/gh-pages-wt/output
          cp -R /tmp/new_output/. /tmp/gh-pages-wt/output/
          if [ -f /tmp/new_state.json ]; then
            cp /tmp/new_state.json /tmp/gh-pages-wt/state.json
          fi
          if [ -f /tmp/new_cache.json ]; then
            cp /tmp/new_cache.json /tmp/gh-pages-wt/cache.json
          fi

          cd /tmp/gh-pages-wt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output state.json cache.json
          git diff --cached --quiet || git commit -m "chore: persist output $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages
          cd -
          git worktree remove /tmp/gh-pages-wt --force
